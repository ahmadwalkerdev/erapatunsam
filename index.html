           ═══════════════════════════════════════════════════════════ */

        @keyframes fabRipple {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }
        .fab-ripple { animation: fabRipple 2s ease-out infinite; }

        // Highlight component - wraps matched text with highlight
        const Highlight = ({ text, query }) => {
          if (!query || !text) return text;
          const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const parts = String(text).split(new RegExp(`(${escaped})`, 'gi'));
          return parts.map((part, i) =>

              ? <mark key={i} className="bg-amber-200/70 text-amber-900 rounded px-0.5 -mx-0.5 font-black">{part}</mark>

          const calculatePaymentDetails = (baseAmount, currency, paymentMethod) => {
            let grossAmount = 0;
            let netAmount = 0;
            let fees = 0;
            
            const PAYPAL_FIXED_FEE = 0.30; 
            const PAYPAL_PERCENTAGE_FEE = 0.044; // 4.4%

            if (baseAmount <= 0) return { grossAmount: 0, netAmount: 0, fees: 0 };

            if (currency === 'USD') {
              if (paymentMethod === 'paypal-fees-client') { 
                netAmount = baseAmount;
                grossAmount = (netAmount + PAYPAL_FIXED_FEE) / (1 - PAYPAL_PERCENTAGE_FEE);
                fees = grossAmount - netAmount;
              } else if (paymentMethod === 'paypal-fees-me') {
                grossAmount = baseAmount;
                netAmount = (grossAmount * (1 - PAYPAL_PERCENTAGE_FEE)) - PAYPAL_FIXED_FEE;
                fees = grossAmount - netAmount;
              } else { 
                grossAmount = baseAmount;
                netAmount = baseAmount;
                fees = 0;
              }
            } else { 
              grossAmount = baseAmount;
              netAmount = baseAmount;
              fees = 0;
            }
            
            return {
              grossAmount: parseFloat(grossAmount.toFixed(2)),
              netAmount: parseFloat(netAmount.toFixed(2)),
              fees: parseFloat(fees.toFixed(2))
            };
          };

          const calculateTotalEarnings = (orderList) => {
            let totalUSD = 0;
            let totalIDR = 0;
            orderList.forEach(task => {
              let netEarnedForTask = 0;
              const totalItemsPrice = task.items.reduce((sum, b) => sum + (Number(b.price) || 0), 0);
              const totalNet = calculatePaymentDetails(totalItemsPrice, task.currency, task.paymentMethod).netAmount;

              if (task.isPaidFull) {
                netEarnedForTask = totalNet;
              } else {
                // Gunakan 50% dari total net jika ditandai lunas
                if (task.firstPayment?.isCompleted) netEarnedForTask += totalNet / 2;
                if (task.remainingPayment?.isCompleted) netEarnedForTask += totalNet / 2;
              }
              if (task.currency === 'USD') totalUSD += netEarnedForTask;
              else totalIDR += netEarnedForTask;
            });
            return { totalUSD, totalIDR };
          };

          const getMonthlyRevenue = () => {
            const months = {};
            orders.forEach(order => {
              const date = new Date(order.dealDate);
              const monthKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
              
              if (!months[monthKey]) {
                months[monthKey] = { usd: 0, idr: 0, count: 0 };
              }

              let netEarned = 0;
              const totalItemsPrice = order.items.reduce((sum, b) => sum + (Number(b.price) || 0), 0);
              const totalNet = calculatePaymentDetails(totalItemsPrice, order.currency, order.paymentMethod).netAmount;

              if (order.isPaidFull) {
                netEarned = totalNet;
              } else {
                if (order.firstPayment?.isCompleted) netEarned += totalNet / 2;
                if (order.remainingPayment?.isCompleted) netEarned += totalNet / 2;
              }

              if (order.currency === 'USD') months[monthKey].usd += netEarned;
              else months[monthKey].idr += netEarned;
              months[monthKey].count += 1;
            });

            return Object.entries(months).sort((a, b) => b[0].localeCompare(a[0]));
          };

          const monthlyData = useMemo(() => getMonthlyRevenue(), [orders]);
          const currentMonthKey = new Date().toISOString().slice(0, 7);
          const currentMonthData = useMemo(() => 
            monthlyData.find(m => m[0] === currentMonthKey)?.[1] || { usd: 0, idr: 0, count: 0 },

          /* ═══════════════════════════════════════════════════════════
             ADVANCED ANALYTICS

          const getTopClients = useCallback((limit = 5) => {
            const clientMap = {};
            orders.forEach(order => {
              const totalItemsPrice = order.items.reduce((sum, b) => sum + (Number(b.price) || 0), 0);
              const totalNet = calculatePaymentDetails(totalItemsPrice, order.currency, order.paymentMethod).netAmount;
              let netEarned = 0;
              if (order.isPaidFull) netEarned = totalNet;
              else {
                if (order.firstPayment?.isCompleted) netEarned += totalNet / 2;
                if (order.remainingPayment?.isCompleted) netEarned += totalNet / 2;
              }
              
              if (!clientMap[order.client]) {
                clientMap[order.client] = { name: order.client, usd: 0, idr: 0, count: 0, totalUSD: 0 };
              }
              if (order.currency === 'USD') {
                clientMap[order.client].usd += netEarned;
                clientMap[order.client].totalUSD += netEarned;
              } else {
                clientMap[order.client].idr += netEarned;
                clientMap[order.client].totalUSD += netEarned / 15000;
              }
              clientMap[order.client].count += 1;
            });
            return Object.values(clientMap).sort((a, b) => b.totalUSD - a.totalUSD).slice(0, limit);

          const getPaymentStatusBreakdown = useCallback(() => {
            let lunas = 0, dpOnly = 0, pending = 0;
            orders.forEach(order => {

              else {
                const dpDone = order.firstPayment?.isCompleted;
                const sisaDone = order.remainingPayment?.isCompleted;
                if (dpDone && sisaDone) lunas++;
                else if (dpDone || sisaDone) dpOnly++;
                else pending++;
              }
            });
            return { lunas, dpOnly, pending, total: orders.length };
          }, [orders]);

          const getAvgCompletionDays = useCallback(() => {
            const completedWithDates = orders.filter(o => o.status === 'Completed' && o.completedAt && o.dealDate);
            if (completedWithDates.length === 0) return null;
            const totalDays = completedWithDates.reduce((sum, o) => {
              const start = new Date(o.dealDate);
              const end = new Date(o.completedAt);
              const days = Math.max(0, (end - start) / (1000 * 60 * 60 * 24));
              return sum + days;
            }, 0);
            return Math.round(totalDays / completedWithDates.length);

             MINI SPARKLINE COMPONENT

             ═══════════════════════════════════════════════════════════ */

          const MiniSparkline = ({ data, width = 120, height = 40, color = '#818cf8' }) => {
            if (!data || data.length < 2) return <div className="w-[120px] h-[40px]" />;
            
            const maxVal = Math.max(...data, 1);
            const minVal = Math.min(...data, 0);
            const range = maxVal - minVal || 1;
            
            const points = data.map((val, i) => {
              const x = (i / (data.length - 1)) * width;
              const y = height - ((val - minVal) / range) * (height - 4) - 2;
              return `${x},${y}`;
            }).join(' ');
            
            const isUp = data[data.length - 1] >= data[0];
            
            return (
              <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className="opacity-80">
                <defs>
                  <linearGradient id="sparkGradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={color} stopOpacity="0.3" />
                    <stop offset="100%" stopColor={color} stopOpacity="0" />
                  </linearGradient>
                </defs>
                <path 
                  d={`M0,${height} L${points.split(' ')[0].split(',')[0]},${points.split(' ')[0].split(',')[1]} L${points.replace(/,/g, ' ')} L${width},${height} Z`} 
                  fill="url(#sparkGradient)" 
                />
                <polyline 
                  points={points} 
                  fill="none" 
                  stroke={color} 
                  strokeWidth="2" 
                  strokeLinecap="round" 
                  strokeLinejoin="round"
                />
                <circle cx={width} cy={points.split(' ')[points.split(' ').length - 1].split(',')[1]} r="3" fill={isUp ? '#34d399' : '#f87171'} />
              </svg>
            );
          };

              </div>
              
              {/* Order Cards Skeleton */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-500">
                {[1, 2, 3, 4, 5, 6].map(i => (
                  <div key={i} className="relative h-72 rounded-2xl md:rounded-3xl border border-slate-200 bg-white/80 p-5 space-y-3 overflow-hidden">
                    {/* Top accent */}
                    <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-slate-200 via-slate-300 to-slate-200 skeleton"></div>
                    {/* Header row */}
                    <div className="flex justify-between items-start pt-2">
                      <div className="w-24 h-6 rounded-full skeleton"></div>
                      <div className="flex gap-1.5">
                        <div className="w-7 h-7 rounded-lg skeleton"></div>
                      </div>
                    </div>
                    {/* Client info */}
                    <div className="space-y-2">
                      <div className="w-32 h-3 rounded-md skeleton"></div>
                      <div className="flex gap-2">
                        <div className="w-20 h-5 rounded-md skeleton"></div>
                        <div className="w-24 h-5 rounded-md skeleton"></div>
                      </div>
                    </div>
                    {/* Progress */}
                    <div className="space-y-1.5 pt-2">
                      <div className="flex justify-between">
                        <div className="w-20 h-3 rounded-md skeleton"></div>
                        <div className="w-16 h-3 rounded-md skeleton"></div>
                      </div>
                      <div className="w-full h-1.5 rounded-full skeleton"></div>
                    </div>
                    {/* Items */}
                    <div className="space-y-1.5">
                      <div className="w-full h-7 rounded-lg skeleton"></div>
                      <div className="w-full h-7 rounded-lg skeleton"></div>
                    </div>
                    {/* Receipt */}
                    <div className="w-full h-16 rounded-xl skeleton-dark mt-3"></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );

        /* ═══════════════════════════════════════════════════════════
           SECTION 5: STAT CARD COMPONENT
           Individual stat display for Bento Grid
           ═══════════════════════════════════════════════════════════ */

        const StatCard = ({ icon: Icon, label, value, color, subtitle, progress, trend }) => {
          const colors = { 
            indigo: { 
              icon: 'text-indigo-600 bg-gradient-to-br from-indigo-50 to-indigo-100/70 border-indigo-200 shadow-sm shadow-indigo-100',
              orb: 'from-indigo-200/60 to-purple-200/40',
              progress: 'from-indigo-500 to-purple-500',
              accent: 'border-indigo-200/60 hover:border-indigo-300'
            }, 
            amber: { 
              icon: 'text-amber-600 bg-gradient-to-br from-amber-50 to-amber-100/70 border-amber-200 shadow-sm shadow-amber-100',
              orb: 'from-amber-200/60 to-orange-200/40',
              progress: 'from-amber-500 to-orange-500',
              accent: 'border-amber-200/60 hover:border-amber-300'
            }, 
            emerald: { 
              icon: 'text-emerald-600 bg-gradient-to-br from-emerald-50 to-emerald-100/70 border-emerald-200 shadow-sm shadow-emerald-100',
              orb: 'from-emerald-200/60 to-teal-200/40',
              progress: 'from-emerald-500 to-teal-500',
              accent: 'border-emerald-200/60 hover:border-emerald-300'
            } 
          };
          const c = colors[color] || colors.indigo;
          return (
            <div className={`relative bg-white/90 backdrop-blur-sm p-4 md:p-5 rounded-2xl border ${c.accent} shadow-sm hover:shadow-lg transition-all group hover:-translate-y-1 overflow-hidden`}>
              {/* Decorative corner orb */}
              <div className={`absolute -top-8 -right-8 w-24 h-24 bg-gradient-to-br ${c.orb} rounded-full blur-2xl opacity-60 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none`}></div>
              
              <div className="relative z-10">
                <div className="flex items-center justify-between mb-3">
                  {/* Icon */}
                  <div className={`p-2.5 md:p-3 rounded-xl border transition-all group-hover:scale-110 group-hover:rotate-3 duration-300 ${c.icon}`}>
                    <Icon size={20} className="md:w-6 md:h-6" strokeWidth={2.5} />
                  </div>
                  {/* Trend indicator */}
                  {trend !== undefined && (
                    <div className={`flex items-center gap-1 px-2 py-0.5 rounded-md text-[9px] font-black ${trend > 0 ? 'bg-emerald-50 text-emerald-700' : trend < 0 ? 'bg-red-50 text-red-700' : 'bg-slate-100 text-slate-500'}`}>
                      <TrendingUp size={10} className={trend < 0 ? 'rotate-180' : ''} strokeWidth={3} />
                      <span>{trend > 0 ? '+' : ''}{trend}</span>
                    </div>
                  )}
                </div>
                
                {/* Label & Value */}
                <div className="mb-2">
                  <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1">{label}</p>
                  <div className="flex items-baseline gap-2">
                    <p className="text-2xl md:text-3xl font-black bg-gradient-to-br from-slate-800 to-slate-600 bg-clip-text text-transparent tabular-nums tracking-tight leading-none">{value}</p>
                    {subtitle && <span className="text-[10px] font-bold text-slate-400">{subtitle}</span>}
                  </div>
                </div>

                {/* Progress bar */}
                {progress !== undefined && progress !== null && (
                  <div className="mt-2">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest">Progress</span>
                      <span className="text-[9px] font-black text-slate-600 tabular-nums">{progress.toFixed(0)}%</span>
                    </div>
                    <div className="h-1 bg-slate-100 rounded-full overflow-hidden">
                      <div 
                        className={`h-full bg-gradient-to-r ${c.progress} rounded-full transition-all duration-700`}
                        style={{ width: `${Math.min(progress, 100)}%` }}
                      ></div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
